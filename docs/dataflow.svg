<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="440" viewBox="0 0 1300 440" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <style>
      .t   { fill:#0f172a; }
      .ttl { font-weight:700; font-size:14px; }
      .cmd { font-family:ui-monospace, monospace; font-size:11.5px; }
      .sub { font-size:11px; fill:#475569; }
      .lane{ font-size:11px; fill:#065f46; }
      .cap { font-size:12px; fill:#334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1300" height="440" fill="#ffffff"/>

  <!-- header -->
  <text x="24" y="34" class="t ttl" font-size="18">gc-plan.sh — dataflow (left → right)</text>
  <text x="24" y="54" class="cap">Size-targeted, oldest-first selection from the dead set. Deletes nothing unless --delete is given.</text>

  <!-- ===================== atime lane (top, optional) ===================== -->
  <!-- F1: stat atime -->
  <rect x="225" y="88" width="175" height="72" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-dasharray="5 4"/>
  <text x="312" y="112" class="t ttl" text-anchor="middle" fill="#065f46">atime source</text>
  <text x="312" y="132" class="cmd" text-anchor="middle" fill="#065f46">stat %X · per path</text>
  <text x="312" y="150" class="lane" text-anchor="middle">last-read time</text>

  <!-- F2: atime gate -->
  <rect x="430" y="88" width="175" height="72" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-dasharray="5 4"/>
  <text x="517" y="112" class="t ttl" text-anchor="middle" fill="#065f46">atime gate</text>
  <text x="517" y="132" class="lane" text-anchor="middle">ro / noatime? empirical?</text>
  <text x="517" y="150" class="lane" text-anchor="middle">frozen → birth only</text>

  <!-- lane arrows -->
  <line x1="400" y1="124" x2="426" y2="124" stroke="#10b981" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="517" y1="160" x2="517" y2="196" stroke="#10b981" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowG)"/>

  <!-- ===================== main pipeline (row) ===================== -->
  <!-- S1 -->
  <rect x="20" y="200" width="175" height="100" rx="10" fill="#eef2ff" stroke="#6366f1"/>
  <text x="107" y="226" class="t ttl" text-anchor="middle" fill="#312e81">1 · Enumerate</text>
  <text x="107" y="250" class="cmd" text-anchor="middle">nix-store --gc</text>
  <text x="107" y="266" class="cmd" text-anchor="middle">--print-dead</text>
  <text x="107" y="288" class="sub" text-anchor="middle">dead set (upper bound)</text>

  <!-- S2 -->
  <rect x="225" y="200" width="175" height="100" rx="10" fill="#eef2ff" stroke="#6366f1"/>
  <text x="312" y="226" class="t ttl" text-anchor="middle" fill="#312e81">2 · Enrich</text>
  <text x="312" y="250" class="cmd" text-anchor="middle">nix path-info --json</text>
  <text x="312" y="270" class="sub" text-anchor="middle">birth = registrationTime</text>
  <text x="312" y="288" class="sub" text-anchor="middle">size = narSize</text>

  <!-- S3 -->
  <rect x="430" y="200" width="175" height="100" rx="10" fill="#eef2ff" stroke="#6366f1"/>
  <text x="517" y="226" class="t ttl" text-anchor="middle" fill="#312e81">3 · Score &amp; sort</text>
  <text x="517" y="250" class="cmd" text-anchor="middle">eff = max(birth, atime)</text>
  <text x="517" y="272" class="sub" text-anchor="middle">sort oldest → newest</text>
  <text x="517" y="290" class="sub" text-anchor="middle">recent read ⇒ protected</text>

  <!-- S4 -->
  <rect x="635" y="200" width="175" height="100" rx="10" fill="#eef2ff" stroke="#6366f1"/>
  <text x="722" y="226" class="t ttl" text-anchor="middle" fill="#312e81">4 · Greedy select</text>
  <text x="722" y="250" class="cmd" text-anchor="middle">accumulate size</text>
  <text x="722" y="272" class="sub" text-anchor="middle">oldest first, until</text>
  <text x="722" y="290" class="sub" text-anchor="middle">Σ size ≥ target</text>

  <!-- S5 (output) -->
  <rect x="840" y="200" width="175" height="100" rx="10" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="927" y="226" class="t ttl" text-anchor="middle" fill="#92400e">5 · Plan</text>
  <text x="927" y="250" class="sub" text-anchor="middle">table: age · size ·</text>
  <text x="927" y="268" class="sub" text-anchor="middle">cum · path</text>
  <text x="927" y="290" class="cmd" text-anchor="middle" fill="#92400e">→ paths.txt</text>

  <!-- S6 (delete, opt-in) -->
  <rect x="1045" y="200" width="175" height="100" rx="10" fill="#fef2f2" stroke="#ef4444"/>
  <text x="1132" y="226" class="t ttl" text-anchor="middle" fill="#991b1b">6 · Delete</text>
  <text x="1132" y="246" class="sub" text-anchor="middle" fill="#991b1b">opt-in: --delete</text>
  <text x="1132" y="266" class="cmd" text-anchor="middle">nix-store --delete</text>
  <text x="1132" y="288" class="sub" text-anchor="middle">skip pinned · keep roots</text>

  <!-- main arrows -->
  <line x1="195" y1="250" x2="221" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="250" x2="426" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="605" y1="250" x2="631" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="810" y1="250" x2="836" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1015" y1="250" x2="1041" y2="250" stroke="#475569" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <!-- ===================== legend ===================== -->
  <g transform="translate(24,360)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#eef2ff" stroke="#6366f1"/>
    <text x="24" y="13" class="cap">pipeline (always runs)</text>

    <rect x="210" y="0" width="16" height="16" rx="3" fill="#ecfdf5" stroke="#10b981" stroke-dasharray="4 3"/>
    <text x="234" y="13" class="cap">atime lane (only if not frozen)</text>

    <rect x="470" y="0" width="16" height="16" rx="3" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="494" y="13" class="cap">plan output (review before delete)</text>

    <rect x="760" y="0" width="16" height="16" rx="3" fill="#fef2f2" stroke="#ef4444"/>
    <text x="784" y="13" class="cap">deletion (opt-in, skips pinned)</text>
  </g>

  <text x="24" y="408" class="cap" fill="#64748b">Fallback: when atime is ro/noatime/frozen, eff = birth (registrationTime) — a build-time proxy, not last-use.</text>
</svg>
